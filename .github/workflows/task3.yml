name: "Task 3: Build and Deploy App"

on:
  workflow_dispatch:
    inputs:
      deploy_dev:
        description: 'Розгортати DEV (8002)?'
        type: boolean
        default: true
      deploy_release:
        description: 'Розгортати RELEASE (8003)?'
        type: boolean
        default: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout App Repo (develop)
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: 'develop'
          path: dev

      - name: Checkout App Repo (release)
        uses: actions/checkout@v4
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: '1.0.0'
          path: release

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Dev
        if: ${{ inputs.deploy_dev }}
        uses: docker/build-push-action@v5
        with:
          context: ./dev
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:develop

      - name: Build and push Release
        if: ${{ inputs.deploy_release }}
        uses: docker/build-push-action@v5
        with:
          context: ./release
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:1.0.0

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init & Validate
        working-directory: ./task1
        run: |
          terraform init
          terraform validate

      - name: Extract Connection Data
        working-directory: ./task1
        run: |
          IP=$(terraform output -raw droplet_ip)
          echo "DROPLET_IP=$IP" >> $GITHUB_ENV
          mkdir -p ~/.ssh
          terraform output -raw private_key > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $IP >> ~/.ssh/known_hosts

      - name: Deploy DEV
        if: ${{ inputs.deploy_dev }}
        run: |
          sed "s/{{ ENV_TYPE }}/dev/g; s|{{ IMAGE_TAG }}|${{ secrets.DOCKERHUB_USERNAME }}/devops-app:develop|g" task3/deployment.yaml > dev.yaml
          ssh -i ~/.ssh/id_rsa root@${{ env.DROPLET_IP }} "kubectl apply -f -" < dev.yaml

      - name: Deploy RELEASE
        if: ${{ inputs.deploy_release }}
        run: |
          sed "s/{{ ENV_TYPE }}/release/g; s|{{ IMAGE_TAG }}|${{ secrets.DOCKERHUB_USERNAME }}/devops-app:1.0.0|g" task3/deployment.yaml > release.yaml
          ssh -i ~/.ssh/id_rsa root@${{ env.DROPLET_IP }} "kubectl apply -f -" < release.yaml

      - name: Wait for Pods
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ env.DROPLET_IP }} "
            if [ \"${{ inputs.deploy_dev }}\" = \"true\" ]; then
              kubectl wait --for=condition=available deployment/app-dev -n ns-dev --timeout=120s
            fi
            if [ \"${{ inputs.deploy_release }}\" = \"true\" ]; then
              kubectl wait --for=condition=available deployment/app-release -n ns-release --timeout=120s
            fi
          "

      - name: Start Port Forwarding
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ env.DROPLET_IP }} "
            # Звільняємо тільки конкретні порти, якщо вони зайняті
            # fuser -k вбиває процеси, що використовують вказаний порт
            if [ \"${{ inputs.deploy_dev }}\" = \"true\" ]; then
              fuser -k 8002/tcp || true
              nohup kubectl port-forward svc/app-service-dev 8002:80 -n ns-dev --address 0.0.0.0 > dev.log 2>&1 &
            fi
            
            if [ \"${{ inputs.deploy_release }}\" = \"true\" ]; then
              fuser -k 8003/tcp || true
              nohup kubectl port-forward svc/app-service-release 8003:80 -n ns-release --address 0.0.0.0 > release.log 2>&1 &
            fi
            
            sleep 5
            ps aux | grep kubectl
          "

      - name: Show URLs and Status
        run: |
          echo "### Статус розгортання:"
          if [ "${{ inputs.deploy_dev }}" = "true" ]; then
            echo "DEV: http://${{ env.DROPLET_IP }}:8002"
          fi
          if [ "${{ inputs.deploy_release }}" = "true" ]; then
            echo "RELEASE: http://${{ env.DROPLET_IP }}:8003"
          fi
          ssh -i ~/.ssh/id_rsa root@${{ env.DROPLET_IP }} "kubectl get pods -A"
