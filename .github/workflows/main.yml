name: "DevOps Exam: Infrastructure & Apps"

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  full-deploy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # TERRAFORM 
      - name: Terraform Init & Apply
        working-directory: ./task1
        run: |
          terraform init
          terraform apply -auto-approve

      # ПІДГОТОВКА ANSIBLE 
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      # ПЕРЕВІРКА ANSIBLE (DRY RUN) 
      # Вимога: Перевірка правильності без реального встановлення
      - name: Ansible Syntax Check & Dry Run
        run: |
          ansible-playbook -i task2/inventory.ini task2/playbook.yml --syntax-check
          ansible-playbook -i task2/inventory.ini task2/playbook.yml --check

      # ВСТАНОВЛЕННЯ
      # Якщо Check зверху впаде, цей крок не запуститься
      - name: Ansible Real Deployment
        run: |
          ansible-playbook -i task2/inventory.ini task2/playbook.yml