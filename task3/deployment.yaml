apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-{{ ENV_TYPE }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app-{{ ENV_TYPE }}
  template:
    metadata:
      labels:
        app: my-app-{{ ENV_TYPE }}
    spec:
      containers:
      - name: application
        image: {{ IMAGE_TAG }}
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: app-service-{{ ENV_TYPE }}
spec:
  type: NodePort
  selector:
    app: my-app-{{ ENV_TYPE }}
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: {{ NODE_PORT }}