---
- name: Install K8s Stack
  hosts: paslavska_nodes
  become: yes
  vars:
    proxy_port: 8001
    # Динамічно визначаємо користувача
    current_user: "{{ ansible_user | default('root') }}"

  tasks:
    - name: 1. Install Core Dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - conntrack
          - socat
          - git
          - docker.io
        update_cache: yes
        state: present

    - name: 2. Install kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ lookup('url', 'https://dl.k8s.io/release/stable.txt') }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: 3. Install Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: 4. Install Helm
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: 5. Cleanup existing Minikube
      command: minikube delete --all --purge
      ignore_errors: yes

    - name: 6. Start Minikube (Fully Automated)
      shell: |
        minikube start \
          --driver=docker \
          --listen-address=0.0.0.0 \
          --force \
          --memory=4000mb \
          --cpus=2
      register: minikube_res

    - name: 7. Enable metrics-server addon
      command: minikube addons enable metrics-server

    - name: 8. Start Kubernetes API Proxy
      shell: |
        nohup kubectl proxy --address='0.0.0.0' --accept-hosts='.*' --port={{ proxy_port }} > /tmp/kubectl-proxy.log 2>&1 &
      async: 10
      poll: 0

    - name: 9. Wait for Proxy to start
      wait_for:
        port: "{{ proxy_port }}"
        timeout: 30

    - name: 10. Get external IP
      uri:
        url: http://ifconfig.me/ip
        return_content: yes
      register: ip_res

    - name: 11. Show Minikube Dashboard URL
      debug:
        msg:
          - "Minikube is running!"
          - "Dashboard access: http://{{ ip_res.content }}:{{ proxy_port }}/api/v1/namespaces/kubernetes-dashboard/services/http:kubernetes-dashboard:/proxy/"
